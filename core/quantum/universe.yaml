# Quantum index universe
#
# Each company has:
#   ticker:                 Yahoo Finance symbol
#   company_name:           Display name
#   quantum_exposure_score: 1-5, how much of business is quantum-related
#                             5 = pure-play quantum
#                             4 = major quantum business inside a larger company (e.g. IBM Q)
#                             3 = significant enabler (semis, EDA, photonics for QC)
#                             2 = adjacent infrastructure (cloud, networking)
#                             1 = light tangential exposure
#   liquidity_score:        1-5, daily $ volume; 5 = mega-cap / very tight spread
#   profitability_score:    1-5, profitability + FCF; 5 = highly profitable
#                             1 = pre-revenue / heavy losses
#   risk_score:             1-5, volatility + drawdown profile; 5 = highly volatile
#   max_weight:             0.0-1.0 hard cap on weight in any index (in addition to index-level caps)
#   notes:                  Free-text rationale
#
# Scores are judgement calls — edit them as your view changes. The
# Quantum Ecosystem Index uses them via the conviction-weight formula:
#   final_score = 0.40*quantum_exposure + 0.20*liquidity + 0.20*profitability - 0.20*risk
#
# Negative final_scores are clamped to 0 (effectively excluded).

